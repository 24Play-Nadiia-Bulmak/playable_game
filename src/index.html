<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,user-scalable=no,initial-scale=1.0, minimum-scale=1.0,maximum-scale=1.0"
    />
    <meta name="ad.orientation" content="portrait,landscape" />
    <title>Playable</title>

    <link href="./css/loader.css" rel="stylesheet" />
    <link href="./css/main.css" rel="stylesheet" />
    <link href="./css/ui.css" rel="stylesheet" />
    <link href="./css/hud.css" rel="stylesheet" />
    <link href="./css/delivery-bar.css" rel="stylesheet" />
    <link href="./css/zombie-progress.css" rel="stylesheet" />
    <style id="animations"></style>
  </head>
  <body>
    <div class="loader">
      <div class="loader_block">
        <img class="loader_icon" src="./resources/images/icon.webp" />
        <div class="loader_box">
          <p class="loader_text">loading</p>
          <div class="loader_wrapper">
            <div id="loader" class="loader_line"></div>
          </div>
        </div>
        <img class="logo24" src="./resources/images/logo24.png" />
      </div>
    </div>
    <div id="interactive">
      <h3 class="interactive-text">Redirected to store...</h3>
    </div>

    <div id="constructor">
      <div id="ui">
        <div id="ui__top">
        <div id="zombie-progress">
            <div class="zombie-progress__header">ZOMBIE INVASION</div>
            <div id="zombie-progress__track">
                <div id="zombie-progress__fill">
                  <img src="../resources/images/Icon_Zombie_Head.webp" id="zombie-progress__icon" alt="zombie" />
                </div>
            </div>
        </div>
        <div id="hud">
          <div class="hud-item hud-item--wood">
            <img class="hud-icon" src="../resources/images/ResourceBackground_Wood.webp" />
            <div class="hud-count" data-type="wood">0</div>
          </div>
          <div class="hud-item hud-item--metal">
            <img class="hud-icon" src="../resources/images/ResourceBackground_Metal.webp" />
            <div class="hud-count" data-type="metal">0</div>
          </div>
        </div>
        </div>
        <div id="ui__middle">
        <div id="delivery-bar">
          <div class="delivery-bar__icons">
            <img class="delivery-bar__icon delivery-bar__icon--background" src="../resources/images/Tool_Background.webp" />
            <img class="delivery-bar__icon delivery-bar__icon--weapon" src="../resources/images/Tool_1.webp" />
          </div>
          <div id="delivery-bar__footer">
            <div id="delivery-bar__level">LVL 0</div>
          </div>
        </div>
        </div>
      </div>
      <div id="editor"></div>
    </div>
    <script id="dev-start">
      window.onload = function () {
        window.setupConfig();
      };

      window.openStorePage = function (url) {
        console.log("openStorePage:", url);
      };
    </script>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
